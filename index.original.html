document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

en-US', { weekday: 'short' }),\n          date: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),\n        });\n        added++;\n      }\n    }\n    return out;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const palettes = {\n      Terracotta: { accent: '#B06A4D', accentSoft: '#EBD9CB', accentDeep: '#8A4F36' },\n      Sage:       { accent: '#7E8C6A', accentSoft: '#DEE2D2', accentDeep: '#5C6A48' },\n      'Clay Rose':{ accent: '#B06A6A', accentSoft: '#EBD3D3', accentDeep: '#8A4D4D' },\n    };\n    const pal = palettes[this.props.accent] || palettes.Terracotta;\n\n    // ---- chip style helpers ----\n    const pill = (sel) => 'padding:10px 18px;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s ease;' +\n      (sel ? 'background:var(--accent,#B06A4D);color:#FCFAF5;border:1px solid var(--accent,#B06A4D);'\n           : 'background:#FCFAF5;color:#3A352E;border:1px solid rgba(42,38,32,.14);');\n    const optBtn = (sel) => 'width:100%;text-align:left;padding:16px 18px;border-radius:14px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s ease;' +\n      (sel ? 'background:var(--accent-soft,#EBD9CB);color:#2A2620;border:1.5px solid var(--accent,#B06A4D);'\n           : 'background:#FCFAF5;color:#3A352E;border:1.5px solid rgba(42,38,32,.1);');\n    const cell = (sel) => 'display:flex;flex-direction:column;align-items:center;gap:3px;padding:13px 6px;border-radius:14px;cursor:pointer;transition:all .2s ease;' +\n      (sel ? 'background:var(--accent,#B06A4D);color:#FCFAF5;border:1.5px solid var(--accent,#B06A4D);'\n           : 'background:#FCFAF5;color:#3A352E;border:1.5px solid rgba(42,38,32,.1);');\n\n    // ---- services ----\n    const all = [\n      { cat: 'Preventive', icon: '🌿', title: 'Cleanings & Exams', blurb: 'Gentle routine visits that keep trouble away.' },\n      { cat: 'Preventive', icon: '✦', title: 'Oral Cancer Screening', blurb: 'Quick, painless checks at every appointment.' },\n      { cat: 'Preventive', icon: '◇', title: 'Fluoride & Sealants', blurb: 'Extra protection, especially for kids.' },\n      { cat: 'Preventive', icon: '❋', title: 'Pediatric Dentistry', blurb: 'Calm first visits that build lifelong trust.' },\n      { cat: 'Preventive', icon: '○', title: 'Periodontal Care', blurb: 'Healthy gums are the foundation of it all.' },\n      { cat: 'Preventive', icon: '◈', title: 'Night Guards', blurb: 'Protect your teeth from grinding and clenching.' },\n      { cat: 'Restorative', icon: '✦', title: 'Ceramic Crowns', blurb: 'Natural-looking strength, same-day options.' },\n      { cat: 'Restorative', icon: '◇', title: 'Implant Dentistry', blurb: 'Permanent replacements that feel like your own.' },\n      { cat: 'Restorative', icon: '○', title: 'Tooth-Colored Fillings', blurb: 'Discreet, durable repair for cavities.' },\n      { cat: 'Restorative', icon: '◈', title: 'Bridges & Dentures', blurb: 'Restore a full, confident bite.' },\n      { cat: 'Restorative', icon: '❋', title: 'Inlays & Onlays', blurb: 'Conservative fixes for larger damage.' },\n      { cat: 'Restorative', icon: '✺', title: 'Emergency Care', blurb: 'Same-day relief when something hurts.' },\n      { cat: 'Cosmetic', icon: '◇', title: 'Invisalign®', blurb: 'Straighten discreetly — no metal brackets.' },\n      { cat: 'Cosmetic', icon: '✦', title: 'Teeth Whitening', blurb: 'A noticeably brighter smile in one visit.' },\n      { cat: 'Cosmetic', icon: '❋', title: 'Porcelain Veneers', blurb: 'Reshape and perfect your smile.' },\n      { cat: 'Cosmetic', icon: '○', title: 'Cosmetic Bonding', blurb: 'Fix chips and gaps in a single visit.' },\n      { cat: 'Cosmetic', icon: '◈', title: 'Smile Makeovers', blurb: 'A custom plan for a complete transformation.' },\n    ];\n    const filterList = ['Preventive', 'Restorative', 'Cosmetic'];\n    const filterChips = filterList.map(f => ({ label: f, style: pill(f === s.filter), onPick: () => this.setState({ filter: f }) }));\n    const services = s.filter === 'All' ? all : all.filter(x => x.cat === s.filter);\n\n    // ---- faq ----\n    const faqData = [\n      { q: 'Are you accepting new patients?', a: \"Absolutely — we love welcoming new faces. Call our new-patient line at (469) 212-9064 and we'll find a time that fits your schedule.\" },\n      { q: 'Do you take my insurance?', a: 'We work with most major PPO plans and file your claims for you. Not insured? Ask about our in-house membership program for affordable routine care.' },\n      { q: 'What should I do in a dental emergency?', a: \"Call us right away. We reserve same-day appointments for emergencies, so you're never left waiting in pain.\" },\n      { q: 'Do you treat children?', a: \"Yes — we're a true family practice and care for patients of every age, from first tooth to wisdom teeth.\" },\n      { q: 'How much does Invisalign cost?', a: 'It depends on your treatment plan, which we map out at a complimentary consultation. We offer flexible financing to keep it comfortable.' },\n      { q: 'What are your office hours?', a: \"We're open Monday through Friday, 8:00am to 5:00pm, and closed weekends so our team can recharge.\" },\n    ];\n    const faqs = faqData.map((f, i) => ({ q: f.q, a: f.a, open: i === s.openFaq, sign: i === s.openFaq ? '–' : '+', onToggle: () => this.setState({ openFaq: s.openFaq === i ? -1 : i }) }));\n\n    // ---- testimonials ----\n    const tData = [\n      { quote: \"The most comfortable I've ever felt at a dentist. They genuinely listen, never rush, and my whole family looks forward to coming in.\", name: 'Maya R.', meta: 'Patient since 2021' },\n      { quote: 'Dr. Hong walked me through every step of my crown and it was completely painless. I finally found a dentist I trust.', name: 'Daniel K.', meta: 'Crown & implant patient' },\n      { quote: 'My kids actually ask to go to the dentist now. The team is warm, patient, and wonderful with little ones.', name: 'Priya S.', meta: 'Mom of two' },\n    ];\n    const testimonial = tData[s.tIndex] || tData[0];\n    const dots = tData.map((_, i) => ({\n      style: 'width:9px;height:9px;border-radius:50%;border:none;cursor:pointer;padding:0;transition:all .3s ease;' + (i === s.tIndex ? 'background:var(--accent-deep,#8A4F36);transform:scale(1.25);' : 'background:rgba(42,38,32,.22);'),\n      onPick: () => this.setState({ tIndex: i }),\n    }));\n\n    // ---- booking ----\n    const reasonList = ['New patient exam & cleaning', 'Routine checkup', 'Cosmetic consultation', 'Invisalign consultation', 'Emergency / tooth pain', 'Something else'];\n    const reasons = reasonList.map(r => ({ label: r, style: optBtn(r === s.service), onPick: () => this.setState({ service: r }) }));\n    const days = this.genDays().map(d => ({ label: d.label, date: d.date, style: cell((d.label + ' ' + d.date) === s.day), onPick: () => this.setState({ day: d.label + ' ' + d.date }) }));\n    const timeList = ['8:00 AM', '9:00 AM', '10:00 AM', '11:00 AM', '1:00 PM', '2:00 PM', '3:00 PM', '4:00 PM'];\n    const times = timeList.map(t => ({ label: t, style: cell(t === s.time), onPick: () => this.setState({ time: t }) }));\n\n    const canProceed = [!!s.service, !!s.day, !!s.time, !!(s.name && s.phone)][s.step];\n    const nextLabel = s.step === 3 ? 'Confirm request' : 'Continue';\n    const nextDisabled = !canProceed;\n    const nextStyle = 'font-size:15px;font-weight:600;color:#FCFAF5;padding:14px 28px;border-radius:100px;border:none;transition:all .25s ease;' +\n      (canProceed ? 'background:var(--accent,#B06A4D);cursor:pointer;box-shadow:0 8px 22px -10px var(--accent-deep,#8A4F36);' : 'background:rgba(42,38,32,.18);cursor:not-allowed;');\n\n    return {\n      ...pal,\n      scrollW: (s.scrollPct * 100).toFixed(2) + '%',\n      // services\n      filterChips, services,\n      // faq\n      faqs,\n      // testimonials\n      testimonial, dots,\n      nextT: () => this.setState(st => ({ tIndex: (st.tIndex + 1) % 3 })),\n      prevT: () => this.setState(st => ({ tIndex: (st.tIndex + 2) % 3 })),\n      // before/after\n      compare: s.compare, compareW: s.compare + '%',\n      setCompare: (e) => this.setState({ compare: +e.target.value }),\n      // booking\n      bookingOpen: s.bookingOpen,\n      openBooking: () => this.setState({ bookingOpen: true, step: 0 }),\n      closeBooking: () => this.setState({ bookingOpen: false }),\n      next: () => { if (canProceed) this.setState(st => ({ step: Math.min(st.step + 1, 4) })); },\n      back: () => this.setState(st => ({ step: Math.max(st.step - 1, 0) })),\n      step: s.step,\n      isStep0: s.step === 0, isStep1: s.step === 1, isStep2: s.step === 2, isStep3: s.step === 3, isStep4: s.step === 4,\n      showBack: s.step > 0 && s.step < 4,\n      showNext: s.step < 4,\n      progressPct: (s.step / 4 * 100) + '%',\n      reasons, days, times,\n      name: s.name, phone: s.phone, service: s.service, day: s.day, time: s.time,\n      nameComma: s.name ? ', ' + s.name.split(' ')[0] : '',\n      setName: (e) => this.setState({ name: e.target.value }),\n      setPhone: (e) => this.setState({ phone: e.target.value }),\n      nextLabel, nextDisabled, nextStyle,\n      // static data\n      pillars: [\n        { no: '01', title: 'Unhurried visits', body: 'We listen first and never rush you through the chair.' },\n        { no: '02', title: 'Digital & precise', body: 'Digital impressions and imaging mean comfort and accuracy.' },\n        { no: '03', title: 'Truly gentle', body: 'Calm, judgment-free care for nervous patients of every age.' },\n        { no: '04', title: 'One trusted roof', body: 'From cleanings to implants, your whole family in one place.' },\n      ],\n      hours: [\n        { day: 'Monday', time: '8:00am – 5:00pm', color: '#5C564C' },\n        { day: 'Tuesday', time: '8:00am – 5:00pm', color: '#5C564C' },\n        { day: 'Wednesday', time: '8:00am – 5:00pm', color: '#5C564C' },\n        { day: 'Thursday', time: '8:00am – 5:00pm', color: '#5C564C' },\n        { day: 'Friday', time: '8:00am – 5:00pm', color: '#5C564C' },\n        { day: 'Saturday & Sunday', time: 'Closed', color: '#B0726A' },\n      ],\n    };\n  }\n\n  componentDidMount() {\n    // testimonial autoplay (timer-based, unaffected by paused CSS timelines)\n    this._ti = setInterval(() => {\n      if (!this.state.bookingOpen) this.setState(st => ({ tIndex: (st.tIndex + 1) % 3 }));\n    }, 6500);\n\n    // scroll progress\n    this._onScroll = () => {\n      const h = document.documentElement;\n      const max = (h.scrollHeight - h.clientHeight) || 1;\n      const top = h.scrollTop || document.body.scrollTop || 0;\n      const pct = Math.max(0, Math.min(1, top / max));\n      if (Math.abs(pct - this.state.scrollPct) > 0.004) this.setState({ scrollPct: pct });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n\n    // scroll-reveal — only hide+animate if the host actually advances animation timelines.\n    // Content is visible at rest, so a frozen/paused preview never hides anything.\n    const els = [...document.querySelectorAll('[data-reveal]')];\n    const start = (document.timeline && document.timeline.currentTime) || 0;\n    this._revTimer = setTimeout(() => {\n      const now = (document.timeline && document.timeline.currentTime) || 0;\n      const animates = now > start + 40;\n      if (!animates) return; // leave everything visible\n      els.forEach(e => {\n        e.style.opacity = '0';\n        e.style.transform = 'translateY(26px)';\n        e.style.transition = 'opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1)';\n      });\n      if ('IntersectionObserver' in window) {\n        const io = new IntersectionObserver((ents) => {\n          ents.forEach(en => {\n            if (en.isIntersecting) { en.target.style.opacity = '1'; en.target.style.transform = 'none'; io.unobserve(en.target); }\n          });\n        }, { threshold: 0.1, rootMargin: '0px 0px -5% 0px' });\n        els.forEach(e => io.observe(e));\n        this._revFallback = setTimeout(() => els.forEach(e => { e.style.opacity = '1'; e.style.transform = 'none'; }), 4500);\n      } else {\n        els.forEach(e => { e.style.opacity = '1'; e.style.transform = 'none'; });\n      }\n    }, 300);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._ti);\n    clearTimeout(this._revTimer);\n    clearTimeout(this._revFallback);\n    window.removeEventListener('scroll', this._onScroll);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
